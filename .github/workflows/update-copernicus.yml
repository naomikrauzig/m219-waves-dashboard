```yaml
name: Update Copernicus snapshots

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Central date as YYYY-MM-DD; leave empty for today UTC"
        required: false
        type: string
      days_ahead:
        description: "Number of future forecast days to fetch after the central date"
        required: false
        default: "5"
        type: string
  schedule:
    - cron: "20 5 * * *"

permissions:
  contents: write

concurrency:
  group: update-copernicus-snapshots
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and render snapshots
        timeout-minutes: 75
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then DATE_ARG="--date ${{ inputs.date }}"; fi

          DAYS_AHEAD="${{ inputs.days_ahead }}"
          if [ -z "$DAYS_AHEAD" ]; then DAYS_AHEAD="5"; fi

          python scripts/fetch_copernicus.py $DATE_ARG --days-ahead "$DAYS_AHEAD" --allow-partial

      - name: Commit generated data and snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Copernicus M219 snapshots"
          file_pattern: |
            assets/snapshots/*.png
            data/raw/*.nc
            data/manifest.json
```
