name: Update Copernicus snapshots

"on":
  workflow_dispatch:
    inputs:
      date:
        description: "Central date as YYYY-MM-DD; leave empty for today UTC"
        required: false
        type: string

      days_ahead:
        description: "Number of future forecast days to fetch after the central date"
        required: false
        default: "5"
        type: string

  schedule:
    - cron: "0 5,17 * * *"

permissions:
  contents: write

concurrency:
  group: update-copernicus-snapshots
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and render snapshots
        timeout-minutes: 75
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi

          DAYS_AHEAD="${{ inputs.days_ahead }}"
          if [ -z "$DAYS_AHEAD" ]; then
            DAYS_AHEAD="5"
          fi

          echo "DATE_ARG=$DATE_ARG"
          echo "DAYS_AHEAD=$DAYS_AHEAD"

          python scripts/fetch_copernicus.py \
            $DATE_ARG \
            --days-ahead "$DAYS_AHEAD" \
            --allow-partial

      - name: Inspect generated manifest
        run: |
          echo "===== GENERATED MANIFEST ====="
          cat data/manifest.json

          echo ""
          echo "===== GIT STATUS ====="
          git status --short

          echo ""
          echo "===== GIT DIFF FOR MANIFEST ====="
          git diff -- data/manifest.json

      - name: Commit generated data and snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/snapshots data/manifest.json

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Update Copernicus M219 snapshots"
          git push origin HEAD:main
