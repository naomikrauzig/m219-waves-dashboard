name: Update Copernicus snapshots

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Snapshot date as YYYY-MM-DD"
        required: false
        type: string
  schedule:
    - cron: "20 5 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch and render snapshots
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then DATE_ARG="--date ${{ inputs.date }}"; fi
          python scripts/fetch_copernicus.py $DATE_ARG --allow-partial
      - name: Commit generated snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Copernicus M219 snapshots"
          file_pattern: assets/snapshots/*.png
